<!DOCTYPE html>
<html>
    <head>
        <title>EVENT MANAGEMENT - LOGIN</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="login-card">
            <h2 class="text-center mb-4 fw-bold">LOGIN</h2>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email"><br>
            <input type="password" id="password" class="form-control mb-3" placeholder="password"><br>
            <button class="btn btn-primary w-100 round-pill" onclick="login()">Login</button>
            <p class="text-center mt-3">Don't have an account? <a href ='register.html' class="register-link">Register</a></p>
        </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
