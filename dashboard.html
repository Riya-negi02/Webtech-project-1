<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>


<body onload="checkLogin()">


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4">

    <span class="navbar-brand fw-bold">EventHub</span>


    <!-- Login / Register -->
    <div class="ms-auto" id="authButtons">

        <a href="login.html" class="btn btn-light btn-sm me-2">
            Login
        </a>

        <a href="register.html" class="btn btn-warning btn-sm">
            Register
        </a>

    </div>


    <!-- Logout -->
    <div id="logoutBtn" style="display:none;">

        <button class="btn btn-light rounded-pill px-4"
            onclick="logout()">

            Logout

        </button>

    </div>

</nav>



<!-- HERO SECTION -->

<div class="hero">

    <h1>Welcome to EventHub</h1>

    <p>Book amazing events near you</p>

</div>



<div class="container mt-5">


    <h3 class="section-title">Available Events</h3>

    <div class="row" id="eventList"></div>


    <hr class="my-5">


    <h3 class="section-title">My Bookings</h3>

    <div class="row" id="myBookings"></div>


</div>



<script src="script.js"></script>

</body>
</html>
