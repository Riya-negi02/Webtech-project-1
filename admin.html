<!DOCTYPE html>
<html>
    <head>
        <title>Admin Panel</title> 
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body onload="loadEvents()">
        <nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4">
            <span class="navbar-brand fw-bold">Admin Section</span>
            <div class="ms-auto">
        <button class="btn btn-light rounded-pill px-4" onclick="logout()">
            Logout
        </button>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-lg p-4 mb-5 border-0 admin-add-card">
        <h4 class="mb-3">Add New Event</h4>
        <div class="row">
            <div class="col-md-4 mb-3">
                <input type="text" id="eventTitle" class="form-control" placeholder="Event Title">
            </div>
            <div class="col-md-4 mb-3">
                <input type="date" id="eventDate" class="form-control">
            </div>
            <div class="col-md-4 mb-3">
                <input type="text" id="eventLocation" class="form-control" placeholder="Location">
            </div>
        </div>

        <button class="btn btn-gradient px-4 mt-2" onclick="addEvent()">
            Add Event
        </button>
    </div>

    <h4 class="section-title">All Events</h4>
    <div class="row" id="eventList"></div>

    </div>
       
        <script src="script.js"></script>
    </body>
</html>
