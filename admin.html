<!DOCTYPE html>
<html>
    <head>
        <title>Admin Panel</title> 
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body onload="loadEvents()">
        <nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4">
            <span class="navbar-brand fw-bold">Admin Section</span>
            <div class="ms-auto">
        <button class="btn btn-light rounded-pill px-4" onclick="logout()">
            Logout
        </button>
    </div>
</nav>

<div class="container mt-5">
    
        <h2 class="text-center mb-4">Add Event</h2>
        <input type="text" id="eventTitle" class="form-control mb-3" placeholder="Event Title">
        <input type="date" id="eventDate" class="form-control mb-3">
        <input type="text" id="eventLocation" class="form-control mb-3" placeholder="Location">
        <button class="btn btn-primary w-100 rounded-pill" onclick="addEvent()">Add Event</button>

        <h2 class="text-center mb-4">All Events</h2>
        <div id="eventList"></div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
