<!DOCTYPE html>
<html>
    <head>
        <title>REGISTER</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="register-card">
            <h2 class="text-center mb-4 fw-bold">Register</h2>
            <input type="text" id="name" class="form-control mb-3" placeholder="Name"><br>
            <input type="email" id="email" class="form-control mb-3" placeholder="Email"><br>
            <input type="password" id="password" class="form-control mb-3" placeholder="password"><br>
            <button class="btn btn-primary w-100 rounded-pill" onclick="register()">Register</button>
            <p class="text-center mt-3">Already have an account?<a href="login.html" class="login-link">Login</a></p>
        </div>
    </div>

        <script src="script.js"></script>
    </body>
</html>
